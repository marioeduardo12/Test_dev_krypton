<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KryptonTech</title>
</head>
<body>
    <div id="lista-carros"></div>
        
    <form id="form-carro">
        <input type="text" id="marca" placeholder="Marca">
        <input type="text" id="modelo" placeholder="Modelo">
        <input type="text" id="cor" placeholder="Cor">
        <input type="number" id="cilindros" placeholder="Cilindros">
        <input type="number" id="litragem" placeholder="Litragem (cc)">
        <input type="text" id="posicionamento" placeholder="Posicionamento dos cilindros">
        <button type="submit">Adicionar</button>
    </form>
<script src="app.js"></script>
</body>
</html>
